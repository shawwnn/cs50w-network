<div class="post card p-3 mb-2" id="post-{{ post.id }}">

    <a href="{% url 'profile' post.user.username %}">
        <strong>{{ post.user.username }}</strong>
    </a>

    <p class="mt-2 mb-1" id="content-{{ post.id }}">
        {{ post.content }}
    </p>

    {% if user == post.user %}
    <div class="mt-3 d-flex align-items-center">


    </div>
    {% endif %}

    <small class="text-muted d-block">
        {{ post.timestamp }}
    </small>

    <div class="mt-3 d-flex align-items-center">
        {% if user.is_authenticated %}
        <button class="btn btn-sm btn-light px-3 rounded-pill like-btn me-2" data-post-id="{{ post.id }}">
            {% if post.is_liked %}Unlike{% else %}Like{% endif %}
        </button>
        {% endif %}

        <span class="text-muted small me-2" id="likes-count-{{ post.id }}">
            {{ post.like_count }} likes
        </span>

        {% if user.is_authenticated and user == post.user %}
        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 edit-btn" data-id="{{ post.id }}">
            Edit
        </button>
        {% endif %}
    </div>
</div>
